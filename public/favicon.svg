<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B6AF7"/>
      <stop offset="100%" stop-color="#5B3DE8"/>
    </linearGradient>
  </defs>
  <!-- Top-left white square -->
  <rect x="64"  y="64"  width="172" height="172" rx="38" fill="white"/>
  <!-- Top-right white square -->
  <rect x="276" y="64"  width="172" height="172" rx="38" fill="white"/>
  <!-- Bottom-left white square -->
  <rect x="64"  y="276" width="172" height="172" rx="38" fill="white"/>
  <!-- Bottom-right semi-transparent square -->
  <rect x="276" y="276" width="172" height="172" rx="38" fill="white" fill-opacity="0.38"/>
</svg>
